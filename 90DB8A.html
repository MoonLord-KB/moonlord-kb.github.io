<div class="article_content">
<p>愛子天皇を巡る皇室典範改正が永田町を揺るがしている。麻生太郎副総裁は女性皇族の身分維持を重視する姿勢を見せる中、高市早苗首相は男系男子の伝統維持を主張。皇位継承を巡る議論は、保守層と世論の間で分裂を引き起こしている。国民の8割が愛子天皇支持の中、麻生氏は高市氏への政治的圧力を巧妙に操作しているとささやかれる。皇室制度の改革案は国会での対決の焦点となり、政権存続のカギを握る問題に。果たして日本の未来の選択は──？</p>
